allowBuilds:
  esbuild: true
  simple-git-hooks: true
  unrs-resolver: true

catalogMode: prefer

cleanupUnusedCatalogs: true
ignoreWorkspaceRootCheck: true

shamefullyHoist: true
shellEmulator: true
strictPeerDependencies: false
trustPolicy: no-downgrade
packages:
  - packages/*
  - examples/*
  - docs
overrides:
  chokidar: ^5.0.0
  semver: ^7.8.0
catalogs:
  build:
    '@antfu/ni': ^30.1.0
    '@nuxt/kit': ^4.4.5
    '@preact/preset-vite': ^2.10.5
    mlly: ^1.8.2
    nuxt: ^4.4.4
    tsdown: ^0.22.0
    tsx: ^4.21.0
    turbo: ^2.9.12
    vite: ^8.0.12
  deps:
    '@modelcontextprotocol/sdk': ^1.29.0
    '@valibot/to-json-schema': ^1.7.0
    birpc: ^4.0.0
    cac: ^7.0.0
    get-port-please: ^3.2.0
    h3: 2.0.1-rc.22
    immer: ^11.1.8
    launch-editor: ^2.13.2
    logs-sdk: ^0.0.6
    mrmime: ^2.0.1
    obug: ^2.1.1
    ohash: ^2.0.11
    open: ^11.0.0
    p-limit: ^7.3.0
    pathe: ^2.0.3
    perfect-debounce: ^2.1.0
    structured-clone-es: ^2.0.0
    tinyglobby: ^0.2.16
    valibot: ^1.4.0
    whenexpr: ^0.1.2
    ws: ^8.20.0
  devtools:
    '@antfu/eslint-config': ^9.0.0
    bumpp: ^11.1.0
    eslint: ^10.3.0
    nano-staged: ^1.0.2
    simple-git-hooks: ^2.13.1
    skills-npm: ^1.1.1
    typescript: ^6.0.3
  docs:
    mermaid: ^11.15.0
    vitepress: ^2.0.0-alpha.17
    vitepress-plugin-mermaid: ^2.0.17
  frontend:
    preact: ^10.29.1
  inlined:
    '@antfu/utils': ^9.3.0
    ua-parser-modern: ^0.1.1
  testing:
    '@playwright/test': ^1.50.0
    tsnapi: ^0.3.3
    vitest: ^4.1.6
  types:
    '@types/node': ^25.7.0
    '@types/ws': ^8.18.1
